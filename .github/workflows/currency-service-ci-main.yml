name: CurrencyService CI

on:
  push:
    branches:
      - Main
      - Dev
    paths:
      - 'CurrencyService/**'
      - 'SharedKernel/**'
  pull_request:
    branches:
      - Main
      - Dev
    paths:
      - 'CurrencyService/**'
      - 'SharedKernel/**'

jobs:
  secrets:
    uses: ./.github/workflows/currency-service-ci-secrets.yml
    secrets:
      PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
  build:
    needs: secrets
    uses: ./.github/workflows/currency-service-ci-build.yml
    with: 
      PACKAGES_TOKEN: ${{ needs.secrets.outputs.PACKAGES_TOKEN }}

  test:
    needs: build
    uses: ./.github/workflows/currency-service-ci-test.yml
    
  sonar:
    needs: test
    uses: ./.github/workflows/currency-service-ci-sonar.yml
    with:
      SONAR_TOKEN: ${{ needs.secrets.outputs.SONAR_TOKEN }}