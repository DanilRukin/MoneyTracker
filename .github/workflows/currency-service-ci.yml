name: CurrencyService CI

on:
    push:
      branches:
          - Main
          - Dev
      path:
        - 'CurrencyService/**'
        - 'SharedKernel/**'
    pull_request:
      branches:
          - Main
          - Dev
      path:
        - 'CurrencyService/**'
        - 'SharedKernel/**'
jobs:
    build_and_test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                dotnet-version: '8.0.x'

            - name: Configure NuGet
              run: |
                sed -i 's/%GITHUB_TOKEN%/${{ secrets.PACKAGES_TOKEN }}/g' CurrencyService/nuget.config

            - name: Restore dependencies
              run: dotnet restore ./CurrencyService/CurrencyService.sln

            - name: Build project
              run: dotnet build ./CurrencyService/CurrencyService.sln --no-restore

            - name: Run tests
              run: dotnet test ./CurrencyService/CurrencyService.sln --no-build --verbosity-normal
